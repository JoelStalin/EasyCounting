map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream easycounting_web {
  server web:8000;
}

upstream easycounting_deploy_hook {
  server host.docker.internal:9000;
}

server {
  listen 80 default_server;
  server_name api.getupsoft.com.do _;

  client_max_body_size 16m;

  location /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /deploy {
    proxy_pass http://easycounting_deploy_hook/deploy;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://easycounting_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 80;
  server_name admin.getupsoft.com.do app.getupsoft.com.do;

  root /usr/share/nginx/html/admin;
  index index.html;
  client_max_body_size 16m;

  location ^~ /api/ {
    proxy_pass http://easycounting_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /auth/ {
    proxy_pass http://easycounting_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(livez|readyz|metrics)$ {
    proxy_pass http://easycounting_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri /index.html;
  }
}

