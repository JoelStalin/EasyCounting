services:
  web:
    build: .
    image: dgii-ecf-web:latest
    env_file: ${ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./xsd:/app/xsd:ro
      - ./alembic:/app/alembic:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certbot/www:/var/www/certbot:ro
      - ./ops/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dgii
      POSTGRES_USER: dgii
      POSTGRES_PASSWORD: dgii
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dgii -d dgii"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
