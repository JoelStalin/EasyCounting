services:
  web:
    build:
      context: .
      args:
        INSTALL_BROWSER_AUTOMATION: ${INSTALL_BROWSER_AUTOMATION:-false}
    image: dgii-ecf-web:latest
    env_file: ${ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      ARTIFACTS_ROOT: /app/tests/artifacts
      STORAGE_BASE_PATH: /var/getupsoft/storage
    volumes:
      - ./xsd:/app/xsd:ro
      - ./alembic:/app/alembic:ro
      - ./secrets:/secrets:ro
      - ./tests/artifacts:/app/tests/artifacts
      - ./logs:/app/logs
      - storage_data:/var/getupsoft/storage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certbot/www:/var/www/certbot:ro
      - ./ops/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dgii
      POSTGRES_USER: dgii
      POSTGRES_PASSWORD: dgii
      TZ: ${TZ:-America/Santo_Domingo}
      PGTZ: ${TZ:-America/Santo_Domingo}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dgii -d dgii"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    command: ["--smtp-auth-allow-insecure"]
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_FILE: ""
      MP_WEBUI_AUTH_FILE: ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  storage_data:
