name: CI/CD

on:
  push:
    branches: ["main", "work", "develop"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/getupsoft/dgii-ecf

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install Poetry export plugin
        run: poetry self add poetry-plugin-export
      - name: Install dependencies
        run: |
          poetry install --with dev --no-root --no-interaction --no-ansi
      - name: Run tests
        run: |
          poetry run pytest -q
      - name: Export requirements
        run: |
          poetry export --only main --without-hashes --format requirements.txt --output requirements.txt

  publish-image:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PAT }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: deploy/Dockerfile.api
          context: .
          provenance: false

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy webhook
        run: |
          curl --fail --show-error --silent --retry 3 -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":"'"${{ github.repository }}"'","ref":"'"${{ github.ref }}"'","sha":"'"${{ github.sha }}"'","image":"'"${{ env.IMAGE_REGISTRY }}:latest"'"}'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
